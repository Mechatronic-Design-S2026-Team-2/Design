# This is intentionally minimal. It assumes you will later launch nav2_bringup
# with a map server / localization source, or replace that with slam_toolbox.
planner_server:
  ros__parameters:
    expected_planner_frequency: 5.0
    planner_plugins: ['GridBased']
    GridBased:
      plugin: 'nav2_navfn_planner/NavfnPlanner'
      tolerance: 0.5
      use_astar: true
      allow_unknown: true

controller_server:
  ros__parameters:
    use_realtime_priority: false
    controller_frequency: 20.0
    controller_plugins: ['FollowPath']
    FollowPath:
      plugin: 'nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController'
      desired_linear_vel: 0.3
      max_angular_accel: 1.5
      lookahead_dist: 0.6
      min_lookahead_dist: 0.3
      max_lookahead_dist: 0.9
      use_velocity_scaled_lookahead_dist: true
      allow_reversing: true

local_costmap:
  local_costmap:
    ros__parameters:
      global_frame: odom
      robot_base_frame: base_link
      update_frequency: 10.0
      publish_frequency: 5.0
      rolling_window: true
      width: 6.0
      height: 6.0
      resolution: 0.05
      footprint: '[[0.55,0.40],[0.55,-0.40],[-0.55,-0.40],[-0.55,0.40]]'
      plugins: ['voxel_layer', 'inflation_layer']
      voxel_layer:
        plugin: 'nav2_costmap_2d::VoxelLayer'
        enabled: true
        publish_voxel_map: false
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        observation_sources: depth_points
        depth_points:
          topic: /camera/depth/points
          data_type: 'PointCloud2'
          marking: true
          clearing: true
          obstacle_range: 4.0
          raytrace_range: 5.0
      inflation_layer:
        plugin: 'nav2_costmap_2d::InflationLayer'
        cost_scaling_factor: 3.0
        inflation_radius: 0.35

global_costmap:
  global_costmap:
    ros__parameters:
      global_frame: map
      robot_base_frame: base_link
      update_frequency: 2.0
      publish_frequency: 1.0
      resolution: 0.05
      track_unknown_space: true
      footprint: '[[0.55,0.40],[0.55,-0.40],[-0.55,-0.40],[-0.55,0.40]]'
      plugins: ['static_layer', 'inflation_layer']
      static_layer:
        plugin: 'nav2_costmap_2d::StaticLayer'
      inflation_layer:
        plugin: 'nav2_costmap_2d::InflationLayer'
        cost_scaling_factor: 3.0
        inflation_radius: 0.35

bt_navigator:
  ros__parameters:
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odometry/filtered
    default_nav_to_pose_bt_xml: ''

behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ['spin', 'backup', 'drive_on_heading', 'wait']
    spin:
      plugin: 'nav2_behaviors/Spin'
    backup:
      plugin: 'nav2_behaviors/BackUp'
    drive_on_heading:
      plugin: 'nav2_behaviors/DriveOnHeading'
    wait:
      plugin: 'nav2_behaviors/Wait'

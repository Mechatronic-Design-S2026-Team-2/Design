# Nav2 parameters for initial low-speed hexapod bringup.
# Assumed upstream stack:
#   ORB-SLAM UDP bridge publishes /hexapod/orbslam_odom and /scan, with TF output disabled.
#   hexapod_hardware_cpp publishes /hexapod/motor_state, /hexapod/kinematic_odom, /hexapod/fused_odom, /odom, and odom->base_link.
#   slam_toolbox consumes /scan + odom->base_link and publishes /map + map->odom.
#   Nav2 publishes /cmd_vel through velocity_smoother into hexapod_tripod_gait.

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 20
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
    error_code_names:
      - compute_path_error_code
      - follow_path_error_code

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0
    costmap_update_timeout: 0.50
    publish_zero_velocity: true
    odom_topic: /odom
    enable_stamped_cmd_vel: false
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    use_realtime_priority: false

    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      # The hexapod often starts slowly while the gait phases settle. Do not abort
      # a waypoint just because the first few seconds of commanded motion are small.
      required_movement_radius: 0.01
      movement_time_allowance: 60.0

    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      stateful: true
      xy_goal_tolerance: 0.12
      yaw_goal_tolerance: 0.35

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      # Jazzy RPP uses desired_linear_vel; newer versions use max_linear_vel. Both are left here.
      # Waypoint command limits. These are still capped again by the operator
      # arbiter, but Nav2 itself must not be left at the old 0.05 m/s bringup values.
      desired_linear_vel: 0.50
      max_linear_vel: 0.50
      min_linear_vel: -0.10
      max_angular_vel: 0.50
      min_angular_vel: -0.50
      max_linear_accel: 1.00
      max_linear_decel: -1.20
      max_angular_accel: 1.20
      max_angular_decel: -1.40
      lookahead_dist: 0.45
      min_lookahead_dist: 0.30
      max_lookahead_dist: 0.80
      lookahead_time: 1.0
      use_velocity_scaled_lookahead_dist: false
      rotate_to_heading_angular_vel: 0.40
      transform_tolerance: 0.50
      min_approach_linear_velocity: 0.08
      approach_velocity_scaling_dist: 0.25
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.0
      # Disable RPP's extra curvature/cost speed derating for initial hardware tests.
      # The operator GUI and velocity smoother still impose the 0.5 m/s waypoint cap.
      use_regulated_linear_velocity_scaling: false
      use_cost_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 0.50
      regulated_linear_scaling_min_speed: 0.15
      cost_scaling_dist: 0.30
      cost_scaling_gain: 1.0
      inflation_cost_scaling_factor: 3.0
      use_rotate_to_heading: true
      allow_reversing: false
      rotate_to_heading_min_angle: 0.60
      max_robot_pose_search_dist: 5.0
      use_interpolation: true

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: odom
      robot_base_frame: base_link
      transform_tolerance: 0.30
      update_frequency: 5.0
      publish_frequency: 2.0
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      always_send_full_costmap: true
      footprint: "[[0.55, 0.45], [0.55, -0.45], [-0.55, -0.45], [-0.55, 0.45]]"
      footprint_padding: 0.03
      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan_nav
          data_type: LaserScan
          marking: true
          clearing: true
          obstacle_min_range: 0.20
          obstacle_max_range: 2.50
          raytrace_min_range: 0.20
          raytrace_max_range: 3.00
          max_obstacle_height: 1.20

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.55
        cost_scaling_factor: 3.0

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: map
      robot_base_frame: base_link
      transform_tolerance: 0.30
      update_frequency: 1.0
      publish_frequency: 1.0
      resolution: 0.05
      track_unknown_space: true
      always_send_full_costmap: true
      footprint: "[[0.55, 0.45], [0.55, -0.45], [-0.55, -0.45], [-0.55, 0.45]]"
      footprint_padding: 0.03
      # Keep the global costmap based on the SLAM occupancy grid only. The local
      # costmap handles live scan obstacles via /scan_nav. This avoids global
      # raytracing warnings while the map is still small.
      plugins: ["static_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        enabled: true
        map_subscribe_transient_local: true
        subscribe_to_updates: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.55
        cost_scaling_factor: 3.0

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 5.0
    costmap_update_timeout: 1.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.25
      use_astar: false
      allow_unknown: true

smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

behavior_server:
  ros__parameters:
    use_sim_time: false
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    enable_stamped_cmd_vel: false
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    local_frame: odom
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.30
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.50
    min_rotational_vel: 0.10
    rotational_acc_lim: 1.20

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 10
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 10.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    enable_stamped_cmd_vel: false
    # Final smoothing clamp before the operator arbiter. Keep this aligned with
    # the GUI waypoint maximums.
    max_velocity: [0.50, 0.0, 0.50]
    min_velocity: [-0.10, 0.0, -0.50]
    max_accel: [1.00, 0.0, 1.20]
    max_decel: [-1.20, 0.0, -1.40]
    odom_topic: /odom
    odom_duration: 0.30
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 0.50

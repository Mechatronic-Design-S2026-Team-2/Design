klann_mppi_controller_node:
  ros__parameters:
    # Canonical controller/motor order: [rf, rm, rb, lf, lm, lb].
    # The phase router maps this to ESP wire order [rb, rm, rf, lf, lm, lb].
    motor_ids: [3, 2, 1, 4, 5, 6]
    linkage_yaml: ""

    # Conservative hardware-safe MPPI profile for the current Jetson + ESP32
    # sweep-odometry bridge.  This intentionally behaves close to a tripod
    # gait prior and only lets MPPI make small corrections.
    horizon_dt_s: 0.05
    horizon_steps: 14
    sample_count: 48
    random_seed: 42

    nominal_phase_rate_rad_s: 0.25
    phase_rate_limit_rad_s: 0.45
    linear_speed_limit_mps: 0.03
    angular_speed_limit_rps: 0.08

    temperature: 0.35
    vx_noise_std: 0.005
    wz_noise_std: 0.02
    phase_rate_noise_std: 0.02

    path_weight: 8.0
    heading_weight: 8.0
    progress_weight: 0.25
    lateral_velocity_weight: 8.0
    yaw_rate_tracking_weight: 1.5

    support_weight: 50.0
    support_margin_weight: 12.0
    slip_weight: 6.0
    roll_weight: 3.0
    pitch_weight: 3.0
    roll_tracking_weight: 0.75
    pitch_tracking_weight: 0.75

    phase_sync_weight: 20.0
    control_smooth_weight: 15.0
    phase_sync_gain: 0.8
    turn_phase_bias_gain: 0.35
    minimum_speed_scale: 0.2
    wave_turn_threshold_rps: 0.35
    in_place_turn_threshold_rps: 0.10

    # Current physical forward convention through the phase router:
    # +x command -> right physical motors positive, left physical motors negative.
    forward_phase_rate_sign: -1.0
    mirror_kinematics_across_y_axis: true

    # Prevent MPPI from reversing individual leg phase rates during near-straight
    # forward walking.  This protects the single-turn encoder unwrap path and
    # removes the observed leg direction thrashing.
    lock_forward_phase_rate_sign: true
    forward_lock_vx_threshold_mps: 0.005
    forward_lock_wz_threshold_rps: 0.12
    min_locked_phase_rate_rad_s: 0.03

    # Stop once the kinematic body-state pose is close to the local test goal.
    goal_tolerance_m: 0.06

    # Optional safety gates.  Keep require_startup_ready false if you launch this
    # node after startup is complete and /hexapod/startup_ready is not latched.
    require_startup_ready: false
    startup_ready_topic: "hexapod/startup_ready"
    body_state_timeout_s: 0.25
    plan_timeout_s: 0.0

    body_bbox_min_x_m: -0.32779819
    body_bbox_max_x_m: 0.42910181
    body_bbox_min_y_m: -0.54833701
    body_bbox_max_y_m: 0.55006299

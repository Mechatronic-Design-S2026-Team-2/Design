slam_toolbox:
  ros__parameters:
    use_sim_time: false
    mode: mapping

    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None
    ceres_num_threads: 4

    map_frame: map
    odom_frame: odom
    base_frame: base_link
    scan_topic: /scan
    throttle_scans: 1

    transform_timeout: 0.3
    tf_buffer_duration: 30.0
    publish_period: 0.03
    map_update_interval: 0.10
    resolution: 0.05
    max_laser_range: 3.0

    minimum_time_interval: 0.08
    minimum_travel_distance: 0.02
    minimum_travel_heading: 0.02

    use_scan_matching: true
    use_scan_barycenter: true
    do_loop_closing: true

    # Conservative defaults for a short-range D415 virtual scan.
    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 4.0

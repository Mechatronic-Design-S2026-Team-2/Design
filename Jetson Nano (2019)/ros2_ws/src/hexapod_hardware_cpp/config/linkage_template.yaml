legs:
  - name: left_front
    mount:
      shaft_x_m: 0.22
      shaft_y_m: 0.14
      yaw_rad: 0.0
    input:
      shaft_point: shaft
      crank_tip_name: crank_tip
      crank_radius_m: 0.018
      phase_offset_rad: 0.0
    foot_point_name: foot
    stance_phase_window_rad: [0.0, 3.141592653589793]
    fixed_points:
      shaft: [0.0, 0.0]
      pivot_a: [0.05, -0.01]
      pivot_b: [0.10, -0.03]
    unknown_points: [joint_b, joint_c, foot]
    distance_constraints:
      - {a: crank_tip, b: joint_b, length_m: 0.06}
      - {a: pivot_a, b: joint_b, length_m: 0.08}
      - {a: joint_b, b: joint_c, length_m: 0.06}

      - {a: joint_c, b: foot, length_m: 0.10}
      - {a: joint_b, b: foot, length_m: 0.11}
    angle_constraints:
      - {a: joint_b, vertex: joint_c, c: foot, angle_rad: 2.356194490192345}
    initial_guess:
      joint_b: [0.03, -0.05]
      joint_c: [0.08, -0.08]
      foot: [0.14, -0.16]

